<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dark Verdict Terminal</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%23d10000' d='M32 6c-11.6 0-21 8.8-21 20 0 7 3.7 13.1 9.3 16.7L18 58l14-8 14 8-2.3-15.3C49.3 39.1 53 33 53 26 53 14.8 43.6 6 32 6zm-8 16a4 4 0 110 8 4 4 0 010-8zm16 0a4 4 0 110 8 4 4 0 010-8zM24 40c2.6-3 13.4-3 16 0-1.9 3.1-5 5-8 5s-6.1-1.9-8-5z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v3">
</head>
<body>
    <div class="noise"></div>
    <div class="grid"></div>
    <div class="blood blood-left"></div>
    <div class="blood blood-right"></div>

    <!-- Кнопка К ЛОРУ в правом верхнем углу -->
    <a href="/" class="action action-kill" style="position: fixed; top: 20px; right: 20px; z-index: 9999; min-width: 96px; min-height: 44px; padding: 10px 18px; font-size: 0.82rem;">К ЛОРУ</a>

    <main class="layout">
        <header class="header">
            <h1 class="title">Выбор объекта</h1>
            <p class="subtitle">ИДЕНТИФИКАТОР: <span>{{ target_id }}</span></p>
        </header>

        <section class="portrait-frame" aria-label="Плейсхолдер личности">
            <div class="portrait-scan"></div>
            <div class="portrait-core">
                <div class="silhouette"></div>
                <div class="loading glitch" data-text="ЗАГРУЗКА ОБЪЕКТА...">ЗАГРУЗКА ОБЪЕКТА...</div>
            </div>
        </section>

        <section class="controls">
            <a class="action action-kill" href="/main?verdict=kill&id=001">ГОЛОСОВАТЬ</a>
            <a class="action action-spare" href="/main?verdict=spare&id=001">ВОЗДЕРЖАТЬСЯ</a>
        </section>

        <!-- Результат SSTI (если есть) -->
        {% if ssti_result %}
        <section class="status status-kill" style="border-left-color: #00e1ff;">
            <h3 style="color: #00e1ff; margin-bottom: 10px;">⚡ РЕЗУЛЬТАТ ВЫПОЛНЕНИЯ ⚡</h3>
            <pre style="background: rgba(0,0,0,0); padding: 15px; overflow-x: auto; color: #00e1ff; font-family: monospace; border: 1px solid #dd00ff;">{{ ssti_result }}</pre>
        </section>
        {% endif %}

        <section class="notes">
            <p>Интерфейс принимает GET-параметры <code>verdict</code> и <code>id</code> для фиксации решения. by Flask 0.12.2</p>
        </section>
    </main>
</body>
</html>
